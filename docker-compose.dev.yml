services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    volumes:
      - ./backend:/app
      - ./rules:/rules:ro
    environment:
      RULES_PATH: /rules
      MITRE_BUNDLE_PATH: /app/src/cyberlens/mitre/data/enterprise-attack.json
    ports:
      - "8000:8000"
      - "5514:514/tcp"
      - "5514:514/udp"
    command: >
      sh -c "pip install -e .[dev] &&
      alembic upgrade head &&
      uvicorn cyberlens.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install &&
      npm run dev"

  nginx:
    ports:
      - "8080:80"
